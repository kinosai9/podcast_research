<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}投资音视频研究助手{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="site-brand">
                <h1><a href="/">投资音视频研究助手</a></h1>
                <span class="subtitle">Local Research Console</span>
            </div>
            <nav class="site-nav">
                {% set current = request.url.path %}
                <a href="/dashboard"{% if current == '/dashboard' %} class="active"{% endif %}>控制台</a>
                <a href="/reports"{% if current.startswith('/reports') %} class="active"{% endif %}>报告库</a>
                <a href="/search"{% if current == '/search' %} class="active"{% endif %}>搜索</a>
                <a href="/sources/channels"{% if current.startswith('/sources') %} class="active"{% endif %}>信息源</a>
                <a href="/docs">API</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            投资音视频研究助手 &mdash; 仅供研究参考，不构成投资建议
        </div>
    </footer>
</body>
</html>
